name: Node.js CI + SonarQube + Artifact

on:
  push:
    branches:
      - main

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests (if exist)
      - name: Run Tests
        run: npm test || echo "No tests found"

      # 5. SonarQube Scan (FIXED AUTH)
      - name: SonarQube Scan
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=node-app \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=.

      # 6. Build (if exists)
      - name: Build project
        run: |
          if [ -f package.json ]; then
            npm run build || echo "No build script found"
          fi

      # 7. Upload Artifact (FIXED - avoid empty paths)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app-artifact
          path: |
            dist/
            build/
            package.json
            package-lock.json
