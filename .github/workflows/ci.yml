name: Node.js CI + SonarQube

on:
  push:
    branches:
      - main

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests (əgər varsa)
      - name: Run Tests
        run: npm test || echo "No tests found"

      # 5. SonarQube Scan (Node.js üçün)
      - name: SonarQube Scan
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=node-app \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # 6. Build (əgər build varsa)
      - name: Build project
        run: |
          if [ -f package.json ]; then
            echo "Node project detected"
            npm run build || echo "No build script"
          fi

      # 7. Upload artifact (Node.js üçün)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            dist/
            build/
            .
